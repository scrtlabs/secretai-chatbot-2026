<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret AI Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.2rem; flex-shrink: 0; }
    select {
      background: #0f3460;
      color: #eee;
      border: 1px solid #533483;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #533483;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #0f3460;
    }
    .msg.error {
      align-self: flex-start;
      background: #6b1a1a;
    }
    #input-area {
      padding: 16px 24px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 12px;
    }
    #message-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #533483;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      outline: none;
    }
    #message-input:focus { border-color: #e94560; }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #e94560;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing { opacity: 0.6; font-style: italic; }
    .thinking-block {
      background: #1a1a2e;
      border-left: 3px solid #533483;
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #a89cc8;
      font-style: italic;
    }
    .thinking-toggle {
      cursor: pointer;
      color: #7c6f9f;
      font-size: 0.8rem;
      margin-bottom: 4px;
      user-select: none;
    }
    .thinking-toggle:hover { color: #a89cc8; }
    .thinking-content { display: none; }
    .thinking-content.open { display: block; }
    .response-content { white-space: normal; }
    .response-content p { margin-bottom: 0.6em; }
    .response-content p:last-child { margin-bottom: 0; }
    .response-content h1, .response-content h2, .response-content h3 {
      margin: 0.8em 0 0.4em; font-size: 1.1em;
    }
    .response-content ul, .response-content ol {
      margin: 0.4em 0; padding-left: 1.5em;
    }
    .response-content li { margin-bottom: 0.2em; }
    .response-content code {
      background: #1a1a2e;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .response-content pre {
      background: #1a1a2e;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .response-content pre code {
      background: none;
      padding: 0;
    }
    .response-content blockquote {
      border-left: 3px solid #533483;
      padding-left: 12px;
      color: #a89cc8;
      margin: 0.5em 0;
    }
    .response-content table {
      border-collapse: collapse;
      margin: 0.5em 0;
    }
    .response-content th, .response-content td {
      border: 1px solid #333;
      padding: 6px 10px;
    }
    .response-content a { color: #e94560; }
  </style>
</head>
<body>
  <header>
    <h1>Secret AI Chat</h1>
    <select id="model-select"></select>
    <button id="clear-btn" style="background: #333; padding: 8px 16px; font-size: 0.85rem;">Clear</button>
  </header>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const clearBtn = document.getElementById("clear-btn");
    const modelSelect = document.getElementById("model-select");

    let messages = [];

    fetch("/api/models")
      .then((r) => r.json())
      .then((models) => {
        models.forEach((m) => {
          const opt = document.createElement("option");
          opt.value = m;
          opt.textContent = m;
          modelSelect.appendChild(opt);
        });
      });

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      if (role === "assistant") {
        const thinkToggle = document.createElement("div");
        thinkToggle.className = "thinking-toggle";
        thinkToggle.style.display = "none";
        thinkToggle.textContent = "Show thinking...";
        thinkToggle.addEventListener("click", () => {
          const tc = div.querySelector(".thinking-content");
          tc.classList.toggle("open");
          thinkToggle.textContent = tc.classList.contains("open") ? "Hide thinking" : "Show thinking...";
        });
        div.appendChild(thinkToggle);

        const thinkContent = document.createElement("div");
        thinkContent.className = "thinking-content thinking-block";
        div.appendChild(thinkContent);

        const responseContent = document.createElement("div");
        responseContent.className = "response-content";
        div.appendChild(responseContent);
      } else {
        div.textContent = content;
      }
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      addMessage("user", text);
      messages.push({ role: "user", content: text });

      sendBtn.disabled = true;
      const typing = addMessage("assistant", "Thinking...");
      typing.classList.add("typing");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: modelSelect.value,
            messages: messages,
          }),
        });

        typing.querySelector(".response-content").textContent = "";
        typing.classList.remove("typing");
        let fullContent = "";
        let fullThinking = "";

        const thinkToggle = typing.querySelector(".thinking-toggle");
        const thinkContent = typing.querySelector(".thinking-content");
        const responseEl = typing.querySelector(".response-content");

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const payload = line.slice(6);
            if (payload === "[DONE]") break;
            try {
              const data = JSON.parse(payload);
              if (data.error) {
                typing.textContent = `Error: ${data.error}`;
                typing.className = "msg error";
                break;
              }
              if (data.thinking) {
                fullThinking += data.thinking;
                thinkToggle.style.display = "block";
                thinkContent.textContent = fullThinking;
              }
              if (data.content) {
                fullContent += data.content;
                responseEl.innerHTML = marked.parse(fullContent);
              }
              chatEl.scrollTop = chatEl.scrollHeight;
            } catch {}
          }
        }

        if (fullContent || fullThinking) {
          messages.push({ role: "assistant", content: fullContent });
        }
      } catch (err) {
        typing.textContent = `Error: ${err.message}`;
        typing.className = "msg error";
      }

      sendBtn.disabled = false;
      input.focus();
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener("click", send);
    clearBtn.addEventListener("click", () => {
      messages = [];
      chatEl.innerHTML = "";
      input.focus();
    });
  </script>
</body>
</html>
